<!DOCTYPE html>
<html>
<head>
  <title>Abhinav AI</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">

  <style>

    body {
      margin: 0;
      padding: 20px;
      background: #0b1020;
      color: white;
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: auto;
      text-align: center;
    }

    .logo {
      width: 120px;
      border-radius: 25px;
      margin-top: 20px;
      box-shadow: 0 0 25px #00aaff;
    }

    h1 {
      font-family: "Bradley Hand ITC", cursive;
      font-size: 58px;
      color: #00aaff;
      margin-bottom: 5px;
    }

    .tagline {
      font-size: 20px;
      color: #cccccc;
      margin-bottom: 25px;
    }

    #chat {
      width: 100%;
      height: 550px;
      overflow-y: auto;
      border: 2px solid #333;
      border-radius: 20px;
      background: #111827;
      padding: 20px;
      text-align: left;
      box-sizing: border-box;
      margin-bottom: 20px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    input {
      flex: 1;
      padding: 16px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
    }

    button {
      padding: 16px 25px;
      border: none;
      border-radius: 12px;
      background: #00aaff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0088dd;
    }

    .image-box {
      margin-top: 20px;
      border: 1px solid #333;
      padding: 15px;
      border-radius: 15px;
      background: #101522;
    }

  </style>

</head>

<body>

  <!-- Replace icon-512.png with your new logo -->
  <img src="icon-512.png" class="logo">

  <h1>Abhinav AI</h1>

  <p class="tagline">
    Anything questioning? Just give me a ring.
  </p>

  <div id="chat">

    <p><b>Abhinav AI:</b> Hello! I am online.</p>

  </div>

  <div class="input-row">

    <input
      id="message"
      placeholder="Ask anything..."
    >

    <button onclick="sendMessage()">
      Send
    </button>

  </div>

  <div class="image-box">

    <h3>🖼 Image Generation</h3>

    <button onclick="generateImage()">
      Generate Image
    </button>

  </div>

  <script>

    async function sendMessage() {

      const input = document.getElementById("message");

      const text = input.value.trim();

      if (!text) return;

      const chat = document.getElementById("chat");

      chat.innerHTML +=
        `<p><b>You:</b> ${text}</p>`;

      input.value = "";

      // Fixed owner response
      if (
        text.toLowerCase().includes("owner")
      ) {

        chat.innerHTML +=
          `<p><b>Abhinav AI:</b> The owner of Abhinav AI is Abhinav Raj.</p>`;

        chat.scrollTop = chat.scrollHeight;

        return;
      }

      try {

        const response = await fetch(
          "https://billowing-glitter-a593.verma-ujjwal2014.workers.dev",
          {
            method: "POST",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify({
              message: text
            })
          }
        );

        const data =
          await response.json();

        chat.innerHTML +=
          `<p><b>Abhinav AI:</b> ${data.reply}</p>`;

      }

      catch (error) {

        chat.innerHTML +=
          `<p><b>Abhinav AI:</b> Error connecting to server.</p>`;

      }

      chat.scrollTop =
        chat.scrollHeight;

    }

    function generateImage() {

      alert(
        "Image generation backend coming soon!"
      );

    }

    if ("serviceWorker" in navigator) {

      navigator.serviceWorker.register(
        "sw.js"
      );

    }

  </script>

</body>
</html>
