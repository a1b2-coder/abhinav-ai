<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ABHINAV BLOCK CRAFT V2</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}

#crosshair{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:28px;
    font-family:monospace;
    user-select:none;
    pointer-events:none;
}

#title{
    position:fixed;
    top:15px;
    right:20px;

    color:gold;
    font-size:30px;
    font-weight:bold;

    text-shadow:
        0 0 10px orange,
        0 0 20px gold;

    z-index:100;
}
</style>
</head>

<body>

<div id="title">
ABHINAV BLOCK CRAFT V2
</div>

<div id="crosshair">+</div>

<script type="module">

import * as THREE from
"https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js";

/* =====================
SCENE
===================== */

const scene = new THREE.Scene();

scene.background =
new THREE.Color(0x87CEEB);

/* =====================
CAMERA
===================== */

const camera =
new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.rotation.order = "YXZ";

/* =====================
RENDERER
===================== */

const renderer =
new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(
    renderer.domElement
);

/* =====================
LIGHTS
===================== */

const sun =
new THREE.DirectionalLight(
    0xffffff,
    1.2
);

sun.position.set(
    50,
    100,
    50
);

scene.add(sun);

scene.add(
    new THREE.AmbientLight(
        0xffffff,
        0.5
    )
);

/* =====================
PLAYER
===================== */

const player = {

    x:0,
    y:3,
    z:0,

    velocityY:0,

    grounded:false,

    speed:0.15
};

let yaw = 0;
let pitch = 0;

const keys = {};

/* =====================
MOUSE LOCK
===================== */

document.body.onclick = ()=>{

    document.body.requestPointerLock();

};

document.addEventListener(
    "mousemove",
    e=>{

        if(
            document.pointerLockElement
            !== document.body
        ) return;

        yaw -= e.movementX * 0.002;

        pitch -= e.movementY * 0.002;

        pitch = Math.max(
            -1.5,
            Math.min(1.5,pitch)
        );

    }
);

/* =====================
KEYS
===================== */

document.addEventListener(
    "keydown",
    e=>{

        keys[e.key.toLowerCase()] = true;

    }
);

document.addEventListener(
    "keyup",
    e=>{

        keys[e.key.toLowerCase()] = false;

    }
);

/* =====================
RESIZE
===================== */

window.addEventListener(
    "resize",
    ()=>{

        camera.aspect =
        window.innerWidth /
        window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

    }
);

console.log("PART A LOADED");

</script>

</body>
</html>
