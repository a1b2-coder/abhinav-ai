<!DOCTYPE html>
<html>
<head>
  <title>Abhinav AI</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">

  <style>

 body {
  margin: 0;
  padding: 20px;
  background: #0b1020;
  color: white;
  font-family: "Bradley Hand ITC", cursive;
  max-width: 1200px;
  margin: auto;
  text-align: center;
}
    .logo {
      width: 120px;
      border-radius: 25px;
      margin-top: 20px;
      box-shadow: 0 0 25px #00aaff;
    }

    h1 {
      font-family: "Bradley Hand ITC", cursive;
      font-size: 58px;
      color: #00aaff;
      margin-bottom: 5px;
    }

    .tagline {
      font-size: 20px;
      color: #cccccc;
      margin-bottom: 25px;
    }

    #chat {
      width: 100%;
      height: 550px;
      overflow-y: auto;
      border: 2px solid #333;
      border-radius: 20px;
      background: #111827;
      padding: 20px;
      text-align: left;
      box-sizing: border-box;
      margin-bottom: 20px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    input {
      flex: 1;
      padding: 16px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
    }

    button {
      padding: 16px 25px;
      border: none;
      border-radius: 12px;
      background: #00aaff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0088dd;
    }

    .image-box {
      margin-top: 20px;
      border: 1px solid #333;
      padding: 15px;
      border-radius: 15px;
      background: #101522;
    }
.message {
  max-width: 75%;
  padding: 12px 18px;
  margin: 10px 0;
  border-radius: 18px;
  word-wrap: break-word;
  clear: both;
  font-size: 18px;
}

.user-message {
  background: #00aaff;
  color: white;
  float: right;
  border-bottom-right-radius: 5px;
}

.ai-message {
  background: #1e293b;
  color: white;
  float: left;
  border-bottom-left-radius: 5px;
  border: 1px solid #334155;
}
  </style>

</head>

<body>

  <!-- Replace icon-512.png with your new logo -->
  <img src="icon-512.png" class="logo">

  <h1>Abhinav AI</h1>

  <p class="tagline">
    Anything questioning? Just give me a ring.
  </p>

 <div id="chat">

  <div class="message ai-message">
    🤖 Hello! I am online.
  </div>

</div>
  <div class="input-row">

    <input
      id="message"
      placeholder="Ask anything..."
    >

    <button onclick="sendMessage()">
      Send
    </button>
<button onclick="startVoice()">🎤</button>
    <div class="input-row">

  <input id="message" placeholder="Ask anything...">

  <button onclick="sendMessage()">
    Send
  </button>

  <button onclick="startVoice()">
    🎤
  </button>

</div>
  </div>

<div class="image-box">

  <h3>🖼 Image Generation</h3>

  <input
    id="imagePrompt"
    placeholder="Describe an image..."
  >

  <br><br>

  <button onclick="generateImage()">
    Generate Image
  </button>

  <br><br>

  <div id="generatedImage"></div>

</div>
  <script>
window.onload = function () {
const settings = {
  voiceMode: localStorage.getItem("voiceMode") || "royal"
};
  const savedChat =
    localStorage.getItem("abhinavChat");

  if (savedChat) {

    document.getElementById("chat").innerHTML =
      savedChat;

  }

};
    async function sendMessage() {

      const input = document.getElementById("message");

      const text = input.value.trim();

      if (!text) return;

      const chat = document.getElementById("chat");

    chat.innerHTML += `
  <div class="message user-message">
    ${text}
  </div>
`;

      input.value = "";

      // Fixed owner response
      if (
        text.toLowerCase().includes("owner")
      ) {

        chat.innerHTML +=
          `<p><b>Abhinav AI:</b> The owner of Abhinav AI is Abhinav Raj.</p>`;

        chat.scrollTop = chat.scrollHeight;

        return;
      }

      try {

        const response = await fetch(
          "https://billowing-glitter-a593.verma-ujjwal2014.workers.dev",
          {
            method: "POST",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify({
              message: text
            })
          }
        );

        const data =
          await response.json();

       chat.innerHTML += `
  <div class="message ai-message">
    🤖 ${data.reply}
  </div>
`;
const speech = new SpeechSynthesisUtterance(data.reply);

if (settings.voiceMode === "royal") {
  speech.lang = "en-GB";
  speech.rate = 0.85;
  speech.pitch = 0.75;
} else {
  speech.lang = "en-IN";
  speech.rate = 1;
  speech.pitch = 1;
}

window.speechSynthesis.speak(speech);
      }

      catch (error) {

      chat.innerHTML += `
  <div class="message ai-message">
    ⚠️ Error connecting to server.
  </div>
`;

      }

      chat.scrollTop =
        chat.scrollHeight;

    }
localStorage.setItem(
  "abhinavChat",
  chat.innerHTML
);
 async function generateImage() {

  const prompt =
    document.getElementById("imagePrompt").value.trim();

  if (!prompt) {

    alert("Please enter an image prompt.");
    return;

  }

  const imageBox =
    document.getElementById("generatedImage");

  imageBox.innerHTML =
    "<p>🧠 Generating image...</p>";

  setTimeout(() => {

    imageBox.innerHTML = `
      <img
        src="https://picsum.photos/500/300"
        style="
          width:100%;
          max-width:500px;
          border-radius:20px;
          box-shadow:0 0 20px #00aaff;
        "
      >
      <p><i>Prompt: ${prompt}</i></p>
    `;

  }, 2000);

}
function startVoice() {

  const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if (!SpeechRecognition) {

    alert("Sorry! Voice input is not supported in this browser.");
    return;

  }

  const recognition = new SpeechRecognition();

  recognition.lang = "en-IN";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = function () {
    console.log("Listening...");
  };

  recognition.onresult = function (event) {

    const transcript =
      event.results[0][0].transcript;

    document.getElementById("message").value =
      transcript;

  };

  recognition.onerror = function (event) {

    alert("Microphone error: " + event.error);

  };

  recognition.start();

}
    function setVoiceMode(mode) {
  settings.voiceMode = mode;
  localStorage.setItem("voiceMode", mode);
}
    if ("serviceWorker" in navigator) {

      
        navigator.serviceWorker.register("service-worker.js");
      

    }

  </script>

</body>
</html>
